<section class="note-page">
    <div class="note-actions" aria-live="polite">
        <button type="button" class="back-button" (click)="goBack()">← Back</button>
        <button type="button" class="edit-button" disabled>Edit</button>
    </div>

    <div class="note-view" *ngIf="!loading && note; else placeholder">
        <header class="note-header">
            <h1>{{ note.title }}</h1>
            <div class="note-meta">
                <span>Owner</span>
                <span>Updated {{ formatDate(note.updatedAt) }}</span>
            </div>
        </header>

        <article class="markdown-body" [innerHTML]="renderedContent"></article>
    </div>

    <ng-template #placeholder>
        <p *ngIf="loading" class="status">Loading…</p>
        <p *ngIf="errorMessage" class="status error">{{ errorMessage }}</p>
        <p *ngIf="!loading && !note && !errorMessage" class="status">Note missing.</p>
    </ng-template>
</section>
