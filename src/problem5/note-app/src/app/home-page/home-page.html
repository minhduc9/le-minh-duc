<section class="notes-page" aria-live="polite">
    <div class="notes-header">
        <h2>Notes board</h2>
        <p>Showing {{ notes.length }} {{ notes.length === 1 ? 'note' : 'notes' }}</p>
    </div>

    <div class="notes-grid">
        <article *ngFor="let note of notes" class="note-card" (click)="selectNote(note)">
            <p class="note-title">{{ note.title }}</p>
        <p class="note-owner">Owner</p>
            <p class="note-access">{{ note.accessRole }}</p>
            <p class="note-meta">Updated {{ formatDate(note.updatedAt) }}</p>
        </article>
    </div>

    <div class="notes-placeholder" *ngIf="!notes.length && !loading">
        No notes yet — create one from the server to see it appear here.
    </div>

    <div class="notes-footer">
        <button
            *ngIf="hasMore && notes.length"
            type="button"
            class="load-more"
            (click)="loadNotes()"
            [disabled]="loading"
        >
            Load more
        </button>
        <span class="loading" *ngIf="loading">Loading…</span>
        <span class="error" *ngIf="errorMessage">{{ errorMessage }}</span>
    </div>
</section>
